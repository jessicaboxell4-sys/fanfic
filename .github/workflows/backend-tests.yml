name: Backend tests + coverage

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: shelfsort_ci
      EMERGENT_LLM_KEY: ""
      RESEND_API_KEY: ""
      SENDER_EMAIL: "onboarding@resend.dev"
      FRONTEND_URL: "http://localhost:3000"
      REACT_APP_BACKEND_URL: "http://localhost:8001"
      CORS_ORIGINS: "*"
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: "lax"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ || true

      - name: Run pytest with TRUE coverage (fails below 60%)
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: shelfsort_ci
        # NOTE: current baseline is ~65%. Raise --fail-under as more tests are
        # added (target: 70%). The biggest coverage gap is in routes/books.py
        # — EPUB upload, FicHub refresh, and AI classification need mocked
        # external services to be properly exercised.
        run: |
          mkdir -p test_reports/pytest
          ./scripts/run_coverage.sh --fail-under=60

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/test_reports/pytest/coverage.xml
          if-no-files-found: ignore

      - name: Publish to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/test_reports/pytest/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: backend/test_reports/pytest/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
