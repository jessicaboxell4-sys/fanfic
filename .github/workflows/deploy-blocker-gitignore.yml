name: 🚨 deploy-blocker — .gitignore must not block env files

# Dedicated, ultra-loud hard-gate for the ONE regression that has
# taken shelfsort.com down three separate times: `.gitignore`
# silently re-adds `.env` / `.env.*` / `*.env` lines, Emergent's
# MANAGE_SECRETS step then can't propagate env vars, the prod pod
# boots without MONGO_URL / REACT_APP_BACKEND_URL, and Cloudflare
# starts returning 520 on every single endpoint.
#
# This workflow runs on EVERY push and EVERY PR.  It has its own
# distinct check name so the GitHub UI surfaces the failure with
# a screaming red label instead of being buried inside the broader
# "Shelfsort lints" job.  Make this a required status check in
# repo Settings → Branches → Protection rules.
#
# Sister of `.github/workflows/lint.yml` — that workflow ALSO runs
# this same lint as part of `scripts/run_all_lints.sh`, but a
# dedicated workflow gives operators a one-glance signal.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

jobs:
  gitignore-env-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fast grep guard (raw signal)
        run: |
          if grep -nE '^\s*(\.env|\.env\.\*|\*\.env)\s*$' .gitignore; then
            echo ""
            echo "::error file=.gitignore::🚨 .gitignore is blocking env files. Emergent's MANAGE_SECRETS step needs the committed backend/.env and frontend/.env files. This pattern took shelfsort.com down 3 times. REMOVE these lines before merging."
            exit 1
          fi
          echo "✓ .gitignore does not block env files (raw grep)"

      - name: Run check_gitignore_health.py (full lint)
        run: python scripts/check_gitignore_health.py
