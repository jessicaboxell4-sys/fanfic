[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
norecursedirs = .git __pycache__ node_modules uploads tests/__pycache__
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Custom markers — keep them in sync with what the tests use so
# --strict-markers doesn't complain.
markers =
    regression_smoke: fast cross-cutting smoke; run with `pytest -m regression_smoke`

# NOTE: coverage is NOT enabled by default because the test suite is
# integration-style (tests hit a running uvicorn over HTTP). For accurate
# coverage, the server must be started under `coverage run` — see
# scripts/run_coverage.sh and the backend-tests GitHub Action.
